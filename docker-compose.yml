services:
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    container_name: prometheus
    user: "1000:1000"
    environment:
      TZ: "America/New_York"
      UID: "1000"
      GID: "1000"
    labels:
      - "net.unraid.docker.webui=http://[IP]:[PORT:9090]"
    ports:
      - '9090:9090'
    volumes:
      - /mnt/user/Docker_Mounts/unpoller-unifi/prometheus/config:/etc/prometheus
      - /mnt/user/Docker_Mounts/unpoller-unifi/prometheus/data:/prometheus
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    container_name: grafana
    user: "1000:1000"
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin123"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PLUGINS_PREINSTALL: "grafana-clock-panel,natel-discrete-panel,grafana-piechart-panel"
      # if Grafana is accessed via a reverse proxy or subpath, you may need these:
      GF_SERVER_ROOT_URL: "http://localhost:3000"  # adjust to your public URL when copying
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      TZ: "America/New_York"
      UID: "1000"
      GID: "1000"
    labels:
      - "net.unraid.docker.webui=http://[IP]:[PORT:3001]"
    ports:
      - '3001:3000'
    volumes:
      - /mnt/user/Docker_Mounts/unpoller-unifi/grafana/data:/var/lib/grafana
      - /mnt/user/Docker_Mounts/unpoller-unifi/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - /mnt/user/Docker_Mounts/unpoller-unifi/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus

  unpoller:
    image: ghcr.io/unpoller/unpoller:latest
    restart: unless-stopped
    container_name: unpoller
    environment:
      UP_INFLUXDB_DISABLE: "true"
      UP_POLLER_DEBUG: "false"
      UP_UNIFI_DYNAMIC: "false"
      UP_PROMETHEUS_HTTP_LISTEN: "0.0.0.0:9130"
      UP_PROMETHEUS_NAMESPACE: "unpoller"
      UP_UNIFI_CONTROLLER_0_VERIFY_SSL: "false"
      UP_UNIFI_CONTROLLER_0_SAVE_ALARMS: "true"
      UP_UNIFI_CONTROLLER_0_SAVE_ANOMALIES: "true"
      UP_UNIFI_CONTROLLER_0_SAVE_EVENTS: "true"
      UP_UNIFI_CONTROLLER_0_SAVE_IDS: "true"
      UP_UNIFI_CONTROLLER_0_SAVE_SITES: "true"
      UP_UNIFI_CONTROLLER_0_SAVE_DPI: "false"
      UP_UNIFI_CONTROLLER_0_URL: "https://10.0.1.1"   # controller IP address or hostname (no trailing slash)
      UP_UNIFI_CONTROLLER_0_USER: "uipoller"          # controller login username
      UP_UNIFI_CONTROLLER_0_PASS: " <REDACTED_PASSWORD>"    # controller login password
      UP_UNIFI_CONTROLLER_0_SITE: "default"
      # the ISP exporter uses an API key (see below); no username/password needed
      TZ: "America/New_York"
    labels:
      - "net.unraid.docker.webui=http://[IP]:[PORT:9130]"
    ports:
      - '9130:9130'

  # additional exporters for internet health checks
  blackbox:
    image: prom/blackbox-exporter:latest
    restart: unless-stopped
    container_name: blackbox
    volumes:
      - /mnt/user/Docker_Mounts/unpoller-unifi/prometheus/config/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - '9115:9115'
    environment:
      TZ: "America/New_York"

  # example speedtest-exporter for measuring real-world throughput/latency
  # speedtest:
  #   image: henry2004y/speedtest_exporter:latest
  #   restart: unless-stopped
  #   container_name: speedtest
  #   ports:
  #     - '9110:9110'
  #   environment:
  #     TZ: "America/New_York"
  #   # scrape interval in Prometheus job should match the exporter interval

  # small Python exporter that polls the UniFi Site Manager ISP metrics
  isp_exporter:
    build:
      context: /mnt/user/Docker_Mounts/unpoller-unifi/isp_exporter
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: isp_exporter
    environment:
      TZ: "America/New_York"
      # the exporter only needs the controller's URL + an API key.
      # the controller URL is already defined for unpoller and is
      # available via the UP_UNIFI_CONTROLLER_0_URL variable:
      #
      #   UP_UNIFI_CONTROLLER_0_URL: "https://10.0.1.1"
      #   UP_UNIFI_CONTROLLER_0_USER: "uipoller"        <- used by unpoller only
      #   UP_UNIFI_CONTROLLER_0_PASS: "…"
      #   UP_UNIFI_CONTROLLER_0_SITE: "default"
      #
      # you do **not** need the username/password here – only the API key
      # shown below.  the key can be hard-coded if you prefer (less secure):
      #   QM_YqjVkMZQ95koWmTxdMykyT1FZkgrk
      # **DO NOT COMMIT YOUR OWN KEY**: replace the value below with your key
      # in your local environment file or via an override (not stored in git).
      UNIFI_API_KEY: "<REDACTED>"   # API key generated in controller's Site Manager > Admins > API Keys (read-only access is sufficient) for the site being monitored
      # if you want the exporter to query the controller's health endpoint you
      # can provide login credentials or reuse the API key.  the value is
      # optional; the script will skip the health call if it can't authenticate.
      # UNIFI_USER: "uipoller"
      # UNIFI_PASS: " <REDACTED_PASSWORD>"
      # optionally probe extra endpoints (latency metrics per URL)
      # EXTRA_ENDPOINTS: "https://example.com,https://api.example.net/health"
      # override to use the cloud API rather than the local controller
      # UNIFI_API_URL: "https://api.ui.com/ea/isp-metrics/5m?duration=24h"
      # direct controller URL is still required by the code but not used when
      # UNIFI_API_URL is set; keep it for backwards compatibility.
      UNIFI_CONTROLLER: "https://10.0.1.1"
      POLL_INTERVAL: "60"   # seconds between polls (set lower for more frequent updates)
      VERIFY_SSL: "false"   # set to true if controller uses valid TLS cert
    ports:
      - '9100:9100'
    depends_on:
      - prometheus

